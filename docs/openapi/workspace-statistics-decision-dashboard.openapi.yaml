openapi: 3.1.0
info:
  title: Workspace Statistics Decision Dashboard
  version: 1.0.0
  description: |
    Aggregated backend contract for `/workspace?section=stats`.
    One response must drive the full decision dashboard for the selected analysis context.
paths:
  /workspace/statistics:
    get:
      summary: Get decision dashboard statistics
      operationId: getWorkspaceStatisticsDecisionDashboard
      parameters:
        - in: query
          name: range
          required: true
          schema:
            type: string
            enum: [24h, 7d, 30d, 90d]
        - in: query
          name: cityId
          required: false
          schema:
            type: string
            nullable: true
        - in: query
          name: regionId
          required: false
          schema:
            type: string
            nullable: true
        - in: query
          name: categoryKey
          required: false
          schema:
            type: string
            nullable: true
      responses:
        '200':
          description: Aggregated decision dashboard response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceStatisticsDecisionDashboard'
components:
  schemas:
    FilterOption:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
        label:
          type: string
        disabled:
          type: boolean
    SelectedFilter:
      type: object
      required: [value, label]
      properties:
        value:
          type: string
          nullable: true
        label:
          type: string
    ContextHealthMetric:
      type: object
      required: [key, value, tone]
      properties:
        key:
          type: string
          enum: [demand, competition, activity]
        value:
          type: string
          enum: [rising, stable, limited, high, balanced, low]
        tone:
          type: string
          enum: [positive, neutral, warning]
    DecisionContext:
      type: object
      required: [mode, period, city, category, health]
      properties:
        mode:
          type: string
          enum: [global, focus]
        period:
          type: string
          enum: [24h, 7d, 30d, 90d]
        city:
          $ref: '#/components/schemas/SelectedFilter'
        region:
          allOf:
            - $ref: '#/components/schemas/SelectedFilter'
          nullable: true
        category:
          $ref: '#/components/schemas/SelectedFilter'
        service:
          allOf:
            - $ref: '#/components/schemas/SelectedFilter'
          nullable: true
        scopeLabel:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        stickyLabel:
          type: string
          nullable: true
        health:
          type: array
          items:
            $ref: '#/components/schemas/ContextHealthMetric'
        lowData:
          type: object
          properties:
            isLowData:
              type: boolean
            title:
              type: string
              nullable: true
            body:
              type: string
              nullable: true
    FilterOptions:
      type: object
      required: [cities, categories, services]
      properties:
        cities:
          type: array
          items:
            $ref: '#/components/schemas/FilterOption'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/FilterOption'
        services:
          type: array
          items:
            $ref: '#/components/schemas/FilterOption'
    SectionMeta:
      type: object
      properties:
        decisionSubtitle:
          type: string
          nullable: true
        demandSubtitle:
          type: string
          nullable: true
        citiesSubtitle:
          type: string
          nullable: true
        opportunityTitle:
          type: string
          nullable: true
        priceTitle:
          type: string
          nullable: true
        insightsSubtitle:
          type: string
          nullable: true
        growthSubtitle:
          type: string
          nullable: true
    OpportunityMetric:
      type: object
      required: [key, value, semanticTone, semanticKey]
      properties:
        key:
          type: string
          enum: [demand, competition, growth, activity]
        value:
          type: number
        semanticTone:
          type: string
          enum: [very-high, high, medium, low]
        semanticKey:
          type: string
          enum: [very_high, high, noticeable, medium, low]
    OpportunityPeerContext:
      type: object
      required: [role, distanceKm, reason]
      properties:
        role:
          type: string
          enum: [focus, competitor]
        distanceKm:
          type: number
          nullable: true
        reason:
          type: string
          enum: [selected_city, nearby_competitor, top_ranked]
    PriceIntelligence:
      type: object
      required:
        - citySlug
        - city
        - categoryKey
        - category
        - recommendedMin
        - recommendedMax
        - marketAverage
        - optimalMin
        - optimalMax
        - smartRecommendedPrice
        - smartSignalTone
        - analyzedRequestsCount
        - confidenceLevel
        - recommendation
        - profitPotentialScore
        - profitPotentialStatus
      properties:
        citySlug:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        categoryKey:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        recommendedMin:
          type: number
          nullable: true
        recommendedMax:
          type: number
          nullable: true
        marketAverage:
          type: number
          nullable: true
        optimalMin:
          type: number
          nullable: true
        optimalMax:
          type: number
          nullable: true
        smartRecommendedPrice:
          type: number
          nullable: true
        smartSignalTone:
          type: string
          nullable: true
          enum: [visibility, balanced, premium]
        analyzedRequestsCount:
          type: number
          nullable: true
        confidenceLevel:
          type: string
          nullable: true
          enum: [high, medium, low]
        recommendation:
          type: string
          nullable: true
        profitPotentialScore:
          type: number
          nullable: true
        profitPotentialStatus:
          type: string
          nullable: true
          enum: [high, medium, low]
    ActivityComparisonPoint:
      type: object
      required: [timestamp, clientActivity, providerActivity]
      properties:
        timestamp:
          type: string
        clientActivity:
          type: number
          nullable: true
        providerActivity:
          type: number
          nullable: true
    ActivityComparison:
      type: object
      required: [hasReliableSeries, points]
      properties:
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        peakTimestamp:
          type: string
          nullable: true
        bestWindowTimestamp:
          type: string
          nullable: true
        updatedAt:
          type: string
          nullable: true
        hasReliableSeries:
          type: boolean
        points:
          type: array
          items:
            $ref: '#/components/schemas/ActivityComparisonPoint'
    OpportunityRadarItem:
      type: object
      required:
        - rank
        - cityId
        - city
        - categoryKey
        - category
        - demand
        - providers
        - marketBalanceRatio
        - score
        - demandScore
        - competitionScore
        - growthScore
        - activityScore
        - status
        - tone
        - summaryKey
        - metrics
      properties:
        rank:
          type: integer
          enum: [1, 2, 3]
        cityId:
          type: string
          nullable: true
        city:
          type: string
        categoryKey:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        demand:
          type: number
        providers:
          type: number
          nullable: true
        marketBalanceRatio:
          type: number
          nullable: true
        score:
          type: number
        demandScore:
          type: number
        competitionScore:
          type: number
        growthScore:
          type: number
        activityScore:
          type: number
        status:
          type: string
          enum: [very_high, good, balanced, competitive, low]
        tone:
          type: string
          enum: [very-high, high, balanced, supply-heavy]
        summaryKey:
          type: string
          enum: [very_high, good, balanced_competitive, balanced, competitive, low_demand, low]
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/OpportunityMetric'
        peerContext:
          allOf:
            - $ref: '#/components/schemas/OpportunityPeerContext'
          nullable: true
        priceIntelligence:
          allOf:
            - $ref: '#/components/schemas/PriceIntelligence'
          nullable: true
    UserComparisonMetric:
      type: object
      required: [key, unit, userValue, marketValue, direction, tone, status]
      properties:
        key:
          type: string
          enum: [offer_rate, response_time, unanswered]
        unit:
          type: string
          enum: [percent, minutes, count]
        userValue:
          type: number
          nullable: true
        marketValue:
          type: number
          nullable: true
        direction:
          type: string
          enum: [up, down, flat]
        tone:
          type: string
          enum: [positive, neutral, warning]
        status:
          type: string
          nullable: true
          enum: [high, medium, low]
    UserFormulaMetric:
      type: object
      required: [key, formula, unit, userValue, marketValue, gap, direction, tone]
      properties:
        key:
          type: string
          enum:
            - offer_rate
            - response_rate
            - conversion_rate
            - completion_rate
            - cancellation_rate
            - avg_response_time
            - revenue
            - avg_order_value
        formula:
          type: string
          enum:
            - offers / requests
            - responses / offers
            - contracts / requests
            - completed / contracts
            - cancellations / contracts
            - sum(response_time) / responses
            - sum(order_price * platform_fee)
            - total_revenue / completed_orders
        unit:
          type: string
          enum: [percent, minutes, currency]
        userValue:
          type: number
          nullable: true
        marketValue:
          type: number
          nullable: true
        gap:
          type: number
          nullable: true
        direction:
          type: string
          enum: [up, down, flat]
        tone:
          type: string
          enum: [positive, neutral, warning]
    UserSignal:
      type: object
      required: [id, type, code, severity]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [risk, opportunity, performance, growth]
        code:
          type: string
          enum:
            - high_unanswered
            - slow_response
            - overpriced
            - underpriced
            - high_demand_city
            - growing_category
            - low_visibility
            - strong_position
        severity:
          type: string
          enum: [high, medium, low]
        metricKey:
          type: string
          nullable: true
          enum:
            - offer_rate
            - response_rate
            - conversion_rate
            - completion_rate
            - cancellation_rate
            - avg_response_time
            - revenue
            - avg_order_value
            - response_time
            - unanswered
        actionCode:
          type: string
          nullable: true
          enum: [respond_faster, adjust_price, focus_market, complete_profile, follow_up_unanswered]
    UserPerformancePosition:
      type: object
      required: [percentile, categoryPercentile, cityPercentile, bucket]
      properties:
        percentile:
          type: number
          nullable: true
        categoryPercentile:
          type: number
          nullable: true
        cityPercentile:
          type: number
          nullable: true
        bucket:
          type: string
          enum: [top, average, below]
        categoryLabel:
          type: string
          nullable: true
        cityLabel:
          type: string
          nullable: true
    UserProfileGap:
      type: object
      required: [fromStage, toStage, lossPercent, lostCount, tone]
      properties:
        fromStage:
          type: string
          enum: [offers]
        toStage:
          type: string
          enum: [confirmations]
        lossPercent:
          type: number
          nullable: true
        lostCount:
          type: number
          nullable: true
        tone:
          type: string
          enum: [positive, neutral, warning]
    UserPriorityItem:
      type: object
      required: [id, code, severity]
      properties:
        id:
          type: string
        code:
          type: string
          enum:
            - slow_response
            - high_unanswered
            - low_visibility
            - high_demand_city
            - growing_category
            - low_competition_segment
            - price_above_market
            - price_below_market
            - strong_position
        severity:
          type: string
          enum: [high, medium, low]
        cityLabel:
          type: string
          nullable: true
        categoryLabel:
          type: string
          nullable: true
        value:
          type: number
          nullable: true
        secondaryValue:
          type: number
          nullable: true
    UserPricing:
      type: object
      required: [currentPrice, recommendedMin, recommendedMax, marketAverage, status, conversionImpact]
      properties:
        currentPrice:
          type: number
          nullable: true
        recommendedMin:
          type: number
          nullable: true
        recommendedMax:
          type: number
          nullable: true
        marketAverage:
          type: number
          nullable: true
        status:
          type: string
          enum: [below, within, above, unknown]
        conversionImpact:
          type: string
          enum: [positive, neutral, warning]
    UserActionStep:
      type: object
      required: [id, code, priority]
      properties:
        id:
          type: string
        code:
          type: string
          enum: [respond_faster, adjust_price, focus_market, complete_profile, follow_up_unanswered]
        priority:
          type: string
          enum: [high, medium, low]
        targetValue:
          type: number
          nullable: true
        cityLabel:
          type: string
          nullable: true
        categoryLabel:
          type: string
          nullable: true
    DecisionLayerMetric:
      type: object
      required: [id, label, marketValue, userValue, gapAbsolute, gapPercent, unit, direction, status, signalCodes, primaryActionCode, summary]
      properties:
        id:
          type: string
          enum: [offer_rate, avg_response_time, unanswered_over_24h, completed_jobs, revenue, average_order_value]
        label:
          type: string
        marketValue:
          type: number
          nullable: true
        userValue:
          type: number
          nullable: true
        gapAbsolute:
          type: number
          nullable: true
        gapPercent:
          type: number
          nullable: true
        unit:
          type: string
          enum: [percent, minutes, currency, count]
        direction:
          type: string
          enum: [better, worse, neutral]
        status:
          type: string
          enum: [good, warning, critical, neutral]
        signalCodes:
          type: array
          items:
            type: string
        primaryActionCode:
          type: string
          nullable: true
          enum: [respond_faster, adjust_price, focus_market, complete_profile, follow_up_unanswered]
        summary:
          type: string
          nullable: true
    DecisionLayerAction:
      type: object
      required: [code, label, target]
      properties:
        code:
          type: string
          enum: [respond_faster, adjust_price, focus_market, complete_profile, follow_up_unanswered]
        label:
          type: string
        target:
          type: string
          nullable: true
    DecisionLayer:
      type: object
      required: [title, subtitle, metrics, primaryInsight, primaryAction]
      properties:
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/DecisionLayerMetric'
        primaryInsight:
          type: string
          nullable: true
        primaryAction:
          allOf:
            - $ref: '#/components/schemas/DecisionLayerAction'
          nullable: true
    PersonalizedPricing:
      type: object
      required: [title, subtitle, contextLabel, marketAverage, recommendedMin, recommendedMax, userPrice, gapAbsolute, position, effect, actionCode, summary]
      properties:
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        contextLabel:
          type: string
          nullable: true
        marketAverage:
          type: number
          nullable: true
        recommendedMin:
          type: number
          nullable: true
        recommendedMax:
          type: number
          nullable: true
        userPrice:
          type: number
          nullable: true
        gapAbsolute:
          type: number
          nullable: true
        position:
          type: string
          enum: [below, within, above, unknown]
        effect:
          type: string
          enum: [positive, neutral, warning]
        actionCode:
          type: string
          nullable: true
          enum: [respond_faster, adjust_price, focus_market, complete_profile, follow_up_unanswered]
        summary:
          type: string
          nullable: true
    CategoryFitItem:
      type: object
      required: [categoryKey, label, marketDemandShare, userFit, opportunity, actionCode, summary]
      properties:
        categoryKey:
          type: string
          nullable: true
        label:
          type: string
        marketDemandShare:
          type: number
          nullable: true
        userFit:
          type: string
          enum: [high, medium, low, unknown]
        opportunity:
          type: string
          enum: [high, medium, low, unknown]
        actionCode:
          type: string
          nullable: true
          enum: [respond_faster, adjust_price, focus_market, complete_profile, follow_up_unanswered]
        summary:
          type: string
          nullable: true
    CategoryFit:
      type: object
      required: [title, subtitle, items]
      properties:
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CategoryFitItem'
    CityComparisonItem:
      type: object
      required: [cityId, city, marketRequests, userActivity, userConversion, actionCode, recommendation]
      properties:
        cityId:
          type: string
          nullable: true
        city:
          type: string
        marketRequests:
          type: number
          nullable: true
        userActivity:
          type: string
          enum: [high, medium, low, unknown]
        userConversion:
          type: number
          nullable: true
        actionCode:
          type: string
          nullable: true
          enum: [respond_faster, adjust_price, focus_market, complete_profile, follow_up_unanswered]
        recommendation:
          type: string
          nullable: true
    CityComparison:
      type: object
      required: [title, subtitle, items]
      properties:
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CityComparisonItem'
    FunnelComparisonStage:
      type: object
      required: [key, label, marketCount, userCount, marketRateFromPrev, userRateFromPrev, gapRate, status, dropOffSeverity, recommendation]
      properties:
        key:
          type: string
          enum: [requests, offers, responses, contracts, completed]
        label:
          type: string
        marketCount:
          type: number
          nullable: true
        userCount:
          type: number
          nullable: true
        marketRateFromPrev:
          type: number
          nullable: true
        userRateFromPrev:
          type: number
          nullable: true
        gapRate:
          type: number
          nullable: true
        status:
          type: string
          enum: [above_market, below_market, at_market, insufficient_data]
        dropOffSeverity:
          type: string
          nullable: true
          enum: [high, medium, low]
        recommendation:
          type: string
          nullable: true
    FunnelComparison:
      type: object
      required: [largestGapStage, largestDropOffStage, primaryBottleneck, nextAction, stages]
      properties:
        comparisonLabel:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        largestGapStage:
          type: string
          nullable: true
          enum: [requests, offers, responses, contracts, completed]
        largestDropOffStage:
          type: string
          nullable: true
          enum: [requests, offers, responses, contracts, completed]
        primaryBottleneck:
          type: string
          nullable: true
        nextAction:
          type: string
          nullable: true
        stages:
          type: array
          items:
            $ref: '#/components/schemas/FunnelComparisonStage'
    UserIntelligence:
      type: object
      required:
        - formulaMetrics
        - decisionMetrics
        - signals
        - performancePosition
        - profileGap
        - risks
        - opportunities
        - pricing
        - nextSteps
      properties:
        comparisonLabel:
          type: string
          nullable: true
        formulaMetrics:
          type: array
          items:
            $ref: '#/components/schemas/UserFormulaMetric'
        decisionMetrics:
          type: array
          items:
            $ref: '#/components/schemas/UserComparisonMetric'
        signals:
          type: array
          items:
            $ref: '#/components/schemas/UserSignal'
        performancePosition:
          $ref: '#/components/schemas/UserPerformancePosition'
        profileGap:
          allOf:
            - $ref: '#/components/schemas/UserProfileGap'
          nullable: true
        risks:
          type: array
          items:
            $ref: '#/components/schemas/UserPriorityItem'
        opportunities:
          type: array
          items:
            $ref: '#/components/schemas/UserPriorityItem'
        pricing:
          allOf:
            - $ref: '#/components/schemas/UserPricing'
          nullable: true
        nextSteps:
          type: array
          items:
            $ref: '#/components/schemas/UserActionStep'
    WorkspaceStatisticsDecisionDashboard:
      type: object
      required:
        - updatedAt
        - mode
        - range
        - decisionContext
        - filterOptions
        - summary
        - kpis
        - activity
        - demand
        - profileFunnel
        - insights
        - growthCards
      properties:
        updatedAt:
          type: string
          format: date-time
        mode:
          type: string
          enum: [platform, personalized]
        range:
          type: string
          enum: [24h, 7d, 30d, 90d]
        decisionContext:
          $ref: '#/components/schemas/DecisionContext'
        filterOptions:
          $ref: '#/components/schemas/FilterOptions'
        sectionMeta:
          $ref: '#/components/schemas/SectionMeta'
        decisionInsight:
          type: string
          nullable: true
        decisionLayer:
          allOf:
            - $ref: '#/components/schemas/DecisionLayer'
          nullable: true
        personalizedPricing:
          allOf:
            - $ref: '#/components/schemas/PersonalizedPricing'
          nullable: true
        categoryFit:
          allOf:
            - $ref: '#/components/schemas/CategoryFit'
          nullable: true
        cityComparison:
          allOf:
            - $ref: '#/components/schemas/CityComparison'
          nullable: true
        summary:
          type: object
          additionalProperties: true
        kpis:
          type: object
          additionalProperties: true
        activity:
          type: object
          additionalProperties: true
        activityComparison:
          allOf:
            - $ref: '#/components/schemas/ActivityComparison'
          nullable: true
        demand:
          type: object
          additionalProperties: true
        opportunityRadar:
          type: array
          items:
            $ref: '#/components/schemas/OpportunityRadarItem'
        priceIntelligence:
          $ref: '#/components/schemas/PriceIntelligence'
          nullable: true
        profileFunnel:
          type: object
          additionalProperties: true
        insights:
          type: array
          items:
            type: object
            additionalProperties: true
        growthCards:
          type: array
          items:
            type: object
            additionalProperties: true
        exportMeta:
          type: object
          properties:
            filename:
              type: string
              nullable: true
        funnelComparison:
          allOf:
            - $ref: '#/components/schemas/FunnelComparison'
          nullable: true
        userIntelligence:
          allOf:
            - $ref: '#/components/schemas/UserIntelligence'
          nullable: true
