name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - chore/**
      - feat/**
      - fix/**
      - refactor/**

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint:strict

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

      - name: Build
        run: npm run build
